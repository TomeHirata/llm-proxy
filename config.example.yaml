# ~/.config/llmproxy/config.yaml — llmproxy v0.1 example
#
# The config file is optional. If omitted, credentials are resolved per-request
# from (1) the Authorization header, or (2) standard environment variables
# (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.). Bedrock always reads AWS creds
# from environment variables only (shared-credentials / profile files are not
# supported in v0.1).

server:
  host: 127.0.0.1
  port: 8080

providers:
  openai:
    api_key: ${OPENAI_API_KEY}

  anthropic:
    api_key: ${ANTHROPIC_API_KEY}

  gemini:
    api_key: ${GEMINI_API_KEY}

  mistral:
    api_key: ${MISTRAL_API_KEY}

  bedrock:
    region: us-east-1
    # credentials from env: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
    # or ~/.aws/credentials

  azure:
    api_key: ${AZURE_OPENAI_API_KEY}
    endpoint: https://my-resource.openai.azure.com
    api_version: "2024-02-01"

# Persistent request/response log with per-request metrics and token usage.
# Enabled by default. Set to false to disable. The Authorization header is
# never recorded.
usage_log:
  enabled: true
  retention_days: 30
  # Only `${ENV_VAR}` interpolation is applied — `~` is not expanded.
  # path: ${HOME}/.local/share/llmproxy/usage.sqlite
